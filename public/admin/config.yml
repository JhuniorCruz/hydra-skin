backend:
  name: git-gateway
  branch: master # Branch to update (optional; defaults to master)

# This enables Cloudinary as the main media library
media_library:
  name: cloudinary
  config:
    cloud_name: dscohihoe
    api_key: m49veuCS0woj50q4kLx3qxJVDFE
    default_transformations:
      - fetch_format: auto
      - quality: auto

collections:
  - name: "services"
    label: "Servicios"
    folder: "public/data/services"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre", name: "name", widget: "string"}
      - {label: "Categoría", name: "category", widget: "select", options: ["Faciales", "Corporales", "Tecnológicos"]}
      - {label: "Minutos", name: "minutes", widget: "number"}
      - {label: "Precio", name: "price", widget: "number"}
      - {label: "Imagen", name: "image", widget: "image"}
      - {label: "Resultado Esperado", name: "expectedResult", widget: "string"}
      - {label: "Descripción Breve", name: "description", widget: "string"}
      - {label: "Descripción Detallada", name: "detailedDescription", widget: "markdown", required: false}

  - name: "gallery"
    label: "Casos de Éxito (Galería)"
    folder: "public/data/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título del Tratamiento", name: "title", widget: "string"}
      - {label: "Foto de Antes", name: "before", widget: "image"}
      - {label: "Foto de Después", name: "after", widget: "image"}
